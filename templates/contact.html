<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - M.S Édit</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">
    <a href="/">Accueil</a>
    <a href="/services">Mes services</a>
    <a href="/parcours">Mon parcours d'auteure</a>
    <a href="/contact">Contact</a>
    <a href="/panier">Panier</a>
</nav>

<img src="{{ url_for('static', filename='images/banniere-msedit.png') }}" alt="Bannière M.S Édit" class="banniere">

<div class="contenu">

    <img src="{{ url_for('static', filename='images/logo-msedit.png') }}" alt="Logo M.S Édit" class="logo">

    <h1>Contact</h1>

    <p>
        Vous souhaitez un devis ou un accompagnement pour votre projet d'écriture ?
    </p>

    <form class="contact-form">

        <label>Nom d'auteur</label><br>
        <input type="text" name="auteur"><br><br>

        <label>Titre du manuscrit</label><br>
        <input type="text" name="titre"><br><br>

        <label>Nombre de pages A5</label><br>
        <input type="number" name="pages"><br><br>

        <label>Adresse mail</label><br>
        <input type="email" name="email"><br><br>

    </form>

    <p>
        📧 ms.edit.mg@gmail.com
    </p>

    <p>
        <strong>Envoi du manuscrit :</strong><br>
        Format Word (.doc ou .docx) uniquement.<br>
        Pas de PDF.
    </p>

</div>

</body>
</html>
